name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.16"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Configure dbt profile
        run: cp dbt_restaurant/profiles.yml.example dbt_restaurant/profiles.yml

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run pytest

      - name: Generate a small test dataset
        run: uv run python scripts/generate_data.py --start-date 2025-07-01 --days 14 --average-orders 20 --seed 42

      - name: Load the test dataset into DuckDB
        run: uv run python scripts/load_raw_data.py

      - name: Run dbt build
        run: uv run dbt build --project-dir dbt_restaurant --profiles-dir dbt_restaurant

      - name: Verify required marts exist
        run: |
          uv run python -c "
          import duckdb
          from restaurant_ops.config import DATABASE_PATH
          required = [
              'mart_daily_performance', 'mart_menu_engineering', 'mart_channel_profitability',
              'mart_labour_productivity', 'mart_service_quality', 'mart_inventory_risk',
              'mart_review_analysis',
          ]
          con = duckdb.connect(str(DATABASE_PATH), read_only=True)
          for mart in required:
              count = con.execute(f'SELECT count(*) FROM marts.{mart}').fetchone()[0]
              assert count > 0, f'{mart} is empty'
              print(f'{mart}: {count} rows')
          "
