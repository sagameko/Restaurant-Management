version: 2

sources:
  - name: raw
    description: >
      Tables loaded by scripts/load_raw_data.py from data/seed/*.csv
      (manually maintained) and data/raw/*.csv (generated by
      restaurant_ops.generation). Fields preserve source values with
      minimal modification; casting and cleaning happen in staging.
    schema: raw
    loader: scripts/load_raw_data.py
    loaded_at_field: loaded_at

    tables:
      - name: menu_items
        description: Manually maintained menu, one row per menu item.
      - name: ingredients
        description: Manually maintained ingredient master.
      - name: suppliers
        description: Manually maintained supplier master.
      - name: recipes
        description: Manually maintained bill-of-materials, one row per (menu item, ingredient).
      - name: employees
        description: Manually maintained staff roster.
      - name: daily_context
        description: Generated daily weather/calendar context, one row per business date.
      - name: orders
        description: Generated synthetic orders, one row per order.
      - name: order_items
        description: Generated synthetic order line items.
      - name: reviews
        description: Generated synthetic customer reviews.
      - name: employee_shifts
        description: Generated synthetic employee shifts.
      - name: inventory_movements
        description: Generated synthetic inventory ledger movements.
